name: Prewarm vcpkg Qt cache

on:
  workflow_dispatch:

jobs:
  prewarm:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            cmake \
            build-essential \
            pkg-config \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            bison \
            flex \
            gperf \
            python3 \
            perl \
            libgl1-mesa-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxrender-dev \
            libxi-dev \
            libglu1-mesa-dev \
            libfontconfig1-dev \
            libwayland-dev \
            wayland-protocols \
            libxcb1-dev \
            libxcb-glx0-dev \
            libxcb-keysyms1-dev \
            libxcb-image0-dev \
            libxcb-shm0-dev \
            libxcb-icccm4-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-shape0-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-util-dev \
            libxcb-xinerama0-dev \
            libxcb-cursor-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Setup vcpkg
        run: |
          if [ ! -x third_party/vcpkg/vcpkg ]; then
            rm -rf third_party/vcpkg
            git clone https://github.com/microsoft/vcpkg.git third_party/vcpkg
            git -C third_party/vcpkg checkout 03e366fb91e38b9432ebd5f8cc79f7c8f55e96ab
            ./third_party/vcpkg/bootstrap-vcpkg.sh
          fi
          third_party/vcpkg/vcpkg version

      - name: Prewarm vcpkg binary cache
        env:
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg-binary-cache,readwrite
        run: |
          rm -rf vcpkg_installed third_party/vcpkg/buildtrees third_party/vcpkg/packages
          mkdir -p "${{ github.workspace }}/vcpkg-binary-cache"
          third_party/vcpkg/vcpkg install --triplet x64-linux

      - name: Verify Qt packages installed
        run: |
          third_party/vcpkg/vcpkg list | grep -E 'qtbase|qtdeclarative|qtwayland|qtsvg|qtshadertools|qtlanguageserver'
          find vcpkg_installed/x64-linux -path '*plugins/platforms*' -type f | sort
          find vcpkg_installed/x64-linux -path '*plugins/platforms*' -type f | grep -E 'qxcb|qwayland'

      - name: Pack vcpkg binary cache
        run: |
          tar -czf vcpkg-binary-cache.tar.gz vcpkg-binary-cache
          ls -lh vcpkg-binary-cache.tar.gz

      - name: Upload vcpkg binary cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-binary-cache-x64-linux
          path: vcpkg-binary-cache.tar.gz
          retention-days: 7
